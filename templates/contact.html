{% extends "base.html" %}
{% block title %}Contact · mlusk.dev{% endblock %}

{% block content %}
<h1>Contact</h1>
<p class="muted">Send me a message and I’ll reply as soon as possible.</p>

<form method="post" action="/contact" class="form">

<label>
Name
<input name="name" required>
</label>

<label>
Email
<input name="email" type="email" required>
</label>

<label>
Message
<textarea name="message" rows="6" required></textarea>
</label>

<button class="button" type="submit">Send Message</button>

</form>
{% endblock %}
