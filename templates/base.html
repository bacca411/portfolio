<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}mlusk.dev{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="/">mlusk.dev</a>
      <nav class="nav">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
        <a href="/projects" class="{% if request.path.startswith('/projects') %}active{% endif %}">Projects</a>
        <a href="/contact" class="{% if request.path.startswith('/contact') %}active{% endif %}">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <span>© {{ 2026 }} Matthew Lusk</span>
      <span class="muted">
        <a href="https://github.com/bacca411" target="_blank" rel="noopener noreferrer">GitHub</a>
           <span>·</span>
      <a href="https://www.linkedin.com/in/matthew-lusk-a98799b1/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      </span>
    </div>
  </footer>
</body>
</html>
